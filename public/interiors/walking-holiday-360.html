<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#eef9ff 0%,#f0fff8 48%,#e8f7ff 100%);color:#102033;overflow:hidden;}
.viewer{position:relative;margin:10px;border-radius:24px;overflow:hidden;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.88);box-shadow:0 18px 46px rgba(16,32,51,.14);backdrop-filter:blur(18px);}
.pano-stage{position:relative;display:none;}
#pano-canvas{display:block;width:100%;height:360px;cursor:grab;background:#dce7ed;}
#pano-canvas.drag{cursor:grabbing;}
.vignette{position:absolute;top:0;left:0;width:100%;height:360px;pointer-events:none;background:linear-gradient(to right,rgba(16,32,51,.22) 0%,transparent 14%,transparent 86%,rgba(16,32,51,.22) 100%),linear-gradient(to bottom,rgba(255,255,255,.14) 0%,transparent 54%,rgba(16,32,51,.56) 100%);}
.compass{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;pointer-events:none;box-shadow:0 8px 22px rgba(16,32,51,.16);backdrop-filter:blur(12px);}
.needle{width:2px;height:22px;position:relative;transform-origin:50% 50%;}
.needle::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:#ee6b45;border-radius:1px 1px 0 0;}
.needle::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:#315b7f;}
.hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.92);padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;color:#315b7f;pointer-events:none;transition:opacity .5s;white-space:nowrap;box-shadow:0 10px 26px rgba(16,32,51,.16);backdrop-filter:blur(12px);}
.hint.off{opacity:0;}
.angle{position:absolute;bottom:14px;left:16px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.92);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:800;color:#315b7f;pointer-events:none;box-shadow:0 8px 20px rgba(16,32,51,.12);backdrop-filter:blur(12px);}
.strip{height:4px;background:rgba(49,91,127,.1);}
.strip-fill{height:100%;background:linear-gradient(90deg,#4A90C4,#5db7de);transition:width .04s linear;}
.info{padding:14px 16px 16px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);}
.shop-tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#e8f5ff;color:#4A90C4;font-size:11px;font-weight:800;letter-spacing:.03em;margin-bottom:8px;}
.shop-name{font-size:21px;font-weight:900;color:#102033;letter-spacing:-.02em;}
.shop-sub{font-size:12px;color:#66788a;margin-top:3px;font-weight:600;}
.viewer-status{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.status-pill{padding:7px 11px;border-radius:999px;background:#163a5b;color:white;font-size:12px;font-weight:900;box-shadow:0 8px 18px rgba(16,32,51,.16);}
.status-copy{font-size:11px;color:#66788a;font-weight:700;text-align:right;}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;}
.pin-circle{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:2px solid #4A90C4;display:flex;align-items:center;justify-content:center;font-size:14px;animation:puls 2.5s ease-in-out infinite;box-shadow:0 8px 18px rgba(16,32,51,.16);}
@keyframes puls{0%,100%{box-shadow:0 0 0 0 rgba(74,144,196,.34),0 8px 18px rgba(16,32,51,.16);}50%{box-shadow:0 0 0 8px rgba(74,144,196,0),0 8px 18px rgba(16,32,51,.16);}}
.pin:hover .pin-circle{transform:scale(1.2);}
.pin-tip{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.92);border-radius:14px;padding:8px 12px;white-space:nowrap;font-size:12px;color:#66788a;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 10px 24px rgba(16,32,51,.16);backdrop-filter:blur(12px);}
.pin:hover .pin-tip{opacity:1;}
.pin-tip b{color:#102033;display:block;font-size:13px;margin-bottom:2px;}
.placeholder{height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#eef9ff,#f0fff8);padding:24px;}
.ph-icon{font-size:52px;line-height:1;}
.ph-name{font-size:18px;font-weight:900;color:#102033;letter-spacing:-.02em;}
.ph-badge{display:inline-flex;align-items:center;gap:4px;background:#e8f5ff;color:#4A90C4;font-size:11px;font-weight:800;padding:4px 12px;border-radius:999px;}
.ph-msg{font-size:14px;font-weight:700;color:#315b7f;text-align:center;}
.ph-sub{font-size:12px;color:#93a4b3;text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div class="viewer">
  <div class="pano-stage" id="pano-stage">
    <canvas id="pano-canvas"></canvas>
    <div class="vignette"></div>
    <div class="compass"><div class="needle" id="needle"></div></div>
    <div class="hint" id="hint">← 드래그해서 둘러보기 →</div>
    <div class="angle" id="angle">0°</div>
  </div>
  <div class="placeholder" id="placeholder">
    <div class="ph-icon">🥐</div>
    <div class="ph-name">위킹홀리데이</div>
    <div class="ph-badge">📷 파노라마 준비 중</div>
    <div class="ph-msg">가게 내부 사진을 촬영 중이에요</div>
    <div class="ph-sub">사진이 등록되면 바로 이곳에서<br>360° 뷰어로 둘러보실 수 있어요</div>
  </div>
  <div class="strip"><div class="strip-fill" id="sfill"></div></div>
  <div class="info">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div>
        <div class="shop-tag" id="stag">창가석</div>
        <div class="shop-name">위킹홀리데이</div>
        <div class="shop-sub">부산 · 광안리 · 통창 오션뷰 브런치</div>
      </div>
      <div class="viewer-status">
        <div class="status-pill">360°</div>
        <div class="status-copy">드래그로 둘러보기</div>
      </div>
    </div>
  </div>
</div>
<script>
const HOTSPOTS=[
  {rx:.05,ry:.50,icon:'🚪',title:'입구',desc:'출입 동선'},
  {rx:.28,ry:.36,icon:'🌊',title:'창가석',desc:'오션뷰 명당 자리'},
  {rx:.54,ry:.30,icon:'🌉',title:'광안대교 뷰',desc:'통창 뷰 포인트'},
  {rx:.80,ry:.46,icon:'🍳',title:'주방 카운터',desc:'오픈 키친'},
];
const TAGS=['입구','창가석','광안대교 뷰','주방 카운터'];
let img=null,offsetX=0,isDrag=false,sx=0,so=0,hinted=false,raf;
const canvas=document.getElementById('pano-canvas');
const ctx=canvas.getContext('2d');
const needle=document.getElementById('needle');
const sfill=document.getElementById('sfill');
const hintEl=document.getElementById('hint');
const angleEl=document.getElementById('angle');
const stagEl=document.getElementById('stag');
function resize(){const W=canvas.offsetWidth,H=canvas.offsetHeight;canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);if(img)draw();}
function draw(){if(!img)return;const W=canvas.offsetWidth,H=canvas.offsetHeight;ctx.clearRect(0,0,W,H);const scale=H/img.naturalHeight;const dW=img.naturalWidth*scale;const maxOx=Math.max(0,dW-W);if(offsetX>maxOx)offsetX=maxOx;if(offsetX<0)offsetX=0;const ox=offsetX;ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,-ox,0,dW,H);const deg=Math.round((ox/dW)*360);needle.style.transform=`rotate(${-deg}deg)`;angleEl.textContent=deg+'°';sfill.style.width=`${(ox/dW)*100}%`;stagEl.textContent=TAGS[Math.floor((ox/dW)*TAGS.length)]||TAGS[0];updatePins(ox,dW);}
function buildPins(){const stage=document.getElementById('pano-stage');stage.querySelectorAll('.pin').forEach(p=>p.remove());HOTSPOTS.forEach((h,i)=>{const p=document.createElement('div');p.className='pin';p.innerHTML=`<div class="pin-circle">${h.icon}</div><div class="pin-tip"><b>${h.title}</b>${h.desc}</div>`;stage.appendChild(p);});}
function updatePins(ox,dW){const pins=document.querySelectorAll('.pin');HOTSPOTS.forEach((h,i)=>{let px=(h.rx*dW-ox);pins[i].style.display=(px<-30||px>canvas.offsetWidth+30)?'none':'block';if(pins[i].style.display==='none')return;pins[i].style.left=px+'px';pins[i].style.top=(h.ry*canvas.offsetHeight)+'px';});}
function scheduleAuto(){cancelAnimationFrame(raf);window.setTimeout(()=>{function step(){if(isDrag)return;const sc=canvas.offsetHeight/img.naturalHeight;const mOx=Math.max(0,img.naturalWidth*sc-canvas.offsetWidth);offsetX+=0.6;if(offsetX>=mOx)return;draw();raf=requestAnimationFrame(step);}raf=requestAnimationFrame(step);},1800);}
window.addEventListener('resize',resize);
canvas.addEventListener('mousedown',e=>{isDrag=true;sx=e.clientX;so=offsetX;canvas.classList.add('drag');cancelAnimationFrame(raf);if(!hinted){hintEl.classList.add('off');hinted=true;}});
window.addEventListener('mousemove',e=>{if(!isDrag)return;offsetX=so+(e.clientX-sx)*1.5;draw();});
window.addEventListener('mouseup',()=>{isDrag=false;canvas.classList.remove('drag');});
canvas.addEventListener('touchstart',e=>{isDrag=true;sx=e.touches[0].clientX;so=offsetX;cancelAnimationFrame(raf);if(!hinted){hintEl.classList.add('off');hinted=true;}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(!isDrag)return;offsetX=so+(e.touches[0].clientX-sx)*1.5;draw();},{passive:true});
canvas.addEventListener('touchend',()=>{isDrag=false;});
const image=new Image();
image.onload=()=>{img=image;document.getElementById('placeholder').style.display='none';document.getElementById('pano-stage').style.display='block';resize();buildPins();scheduleAuto();};
image.onerror=()=>{};
image.src='./walking-holiday-360.jpg';
</script>
</body>
</html>
