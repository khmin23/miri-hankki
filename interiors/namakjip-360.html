<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#0e0c0a;color:#f0ede8;overflow:hidden;}
#pano-canvas{display:block;width:100%;height:400px;cursor:grab;}
#pano-canvas.drag{cursor:grabbing;}
.vignette{position:absolute;top:0;left:0;width:100%;height:400px;pointer-events:none;background:linear-gradient(to right,rgba(14,12,10,.6) 0%,transparent 12%,transparent 88%,rgba(14,12,10,.6) 100%),linear-gradient(to bottom,rgba(14,12,10,.2) 0%,transparent 18%,transparent 72%,rgba(14,12,10,.8) 100%);}
.compass{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:50%;background:rgba(14,12,10,.75);border:.5px solid rgba(240,237,232,.2);display:flex;align-items:center;justify-content:center;pointer-events:none;}
.needle{width:2px;height:22px;position:relative;transform-origin:50% 50%;}
.needle::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:#e55;border-radius:1px 1px 0 0;}
.needle::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(240,237,232,.4);}
.hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(14,12,10,.72);border:.5px solid rgba(240,237,232,.2);padding:8px 18px;border-radius:20px;font-size:13px;color:rgba(240,237,232,.75);pointer-events:none;transition:opacity .5s;white-space:nowrap;}
.hint.off{opacity:0;}
.angle{position:absolute;bottom:408px;left:14px;background:rgba(14,12,10,.72);border:.5px solid rgba(240,237,232,.18);border-radius:12px;padding:4px 10px;font-size:12px;color:rgba(240,237,232,.6);pointer-events:none;}
.strip{height:2px;background:rgba(240,237,232,.08);}
.strip-fill{height:100%;background:#c8903a;transition:width .04s linear;}
.info{padding:14px 18px 18px;background:#0e0c0a;}
.shop-tag{font-size:11px;letter-spacing:.08em;color:#c8903a;text-transform:uppercase;margin-bottom:4px;}
.shop-name{font-size:20px;font-weight:700;}
.shop-sub{font-size:12px;color:rgba(240,237,232,.4);margin-top:3px;}
.rating-num{font-size:24px;font-weight:700;color:#c8903a;line-height:1;}
.rating-stars{font-size:11px;color:#c8903a;text-align:right;margin-top:2px;}
.rating-count{font-size:11px;color:rgba(240,237,232,.35);text-align:right;}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;}
.pin-circle{width:26px;height:26px;border-radius:50%;background:rgba(200,144,58,.15);border:1.5px solid #c8903a;display:flex;align-items:center;justify-content:center;font-size:12px;animation:puls 2.5s ease-in-out infinite;}
@keyframes puls{0%,100%{box-shadow:0 0 0 0 rgba(200,144,58,.4);}50%{box-shadow:0 0 0 7px rgba(200,144,58,0);}}
.pin:hover .pin-circle{transform:scale(1.2);}
.pin-tip{position:absolute;bottom:33px;left:50%;transform:translateX(-50%);background:rgba(14,12,10,.92);border:.5px solid rgba(200,144,58,.45);border-radius:8px;padding:7px 11px;white-space:nowrap;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;}
.pin:hover .pin-tip{opacity:1;}
.pin-tip b{color:#c8903a;display:block;font-size:13px;margin-bottom:2px;}
</style>
</head>

<div style="position:relative;">

</div>
<div class="strip"><div class="strip-fill" id="sfill"></div></div>
<div class="info">

  </div>
</div>

function resize(){
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);draw();
}

function draw(){
  if(!img)return;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);
  const scale=H/img.naturalHeight;
  const dW=img.naturalWidth*scale;
  const ox=((offsetX%dW)+dW)%dW;
  ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,-ox,0,dW,H);
  ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,dW-ox,0,dW,H);
  const deg=Math.round((ox/dW)*360);
  needle.style.transform=`rotate(${-deg}deg)`;
  sfill.style.width=`${(ox/dW)*100}%`;
  angleEl.textContent=deg+'°';
  if(deg<15||deg>345) stagEl.textContent='왼쪽 입구';
  else if(deg<100) stagEl.textContent='카운터 좌석';
  else if(deg<220) stagEl.textContent='오픈 주방';
  else if(deg<310) stagEl.textContent='오른쪽 입구';
  else stagEl.textContent='카운터 좌석';
  updatePins(ox,dW);
}

function buildPins(){
  const root=document.querySelector('div');
  HOTSPOTS.forEach((h,i)=>{
    const el=document.createElement('div');
    el.className='pin';el.id='p'+i;
    el.innerHTML=`<div class="pin-circle">${h.icon}</div><div class="pin-tip"><b>${h.title}</b>${h.desc}</div>`;
    root.appendChild(el);
  });
}

function updatePins(ox,dW){
  const cH=400;
  HOTSPOTS.forEach((h,i)=>{
    const el=document.getElementById('p'+i);if(!el)return;
    let sx=(h.rx*dW-ox);
    if(sx<-30)sx+=dW;
    const pct=sx/canvas.offsetWidth*100;
    el.style.display=(pct<-5||pct>105)?'none':'block';
    el.style.left=pct+'%';
    el.style.top=(h.ry*(cH/(cH+90))*100)+'%';
  });
}

canvas.addEventListener('mousedown',e=>{isDrag=true;sx=e.clientX;so=offsetX;canvas.classList.add('drag');cancelAnimationFrame(raf);if(!hinted){hintEl.classList.add('off');hinted=true;}});
window.addEventListener('mousemove',e=>{if(!isDrag)return;offsetX=so+(e.clientX-sx)*1.5;draw();});
window.addEventListener('mouseup',()=>{isDrag=false;canvas.classList.remove('drag');scheduleAuto();});
canvas.addEventListener('touchstart',e=>{isDrag=true;sx=e.touches[0].clientX;so=offsetX;cancelAnimationFrame(raf);if(!hinted){hintEl.classList.add('off');hinted=true;}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(!isDrag)return;offsetX=so+(e.touches[0].clientX-sx)*1.5;draw();},{passive:true});
canvas.addEventListener('touchend',()=>{isDrag=false;scheduleAuto();});

function scheduleAuto(){
  clearTimeout(window._at);
  window._at=setTimeout(()=>{
    function step(){if(isDrag)return;offsetX-=0.6;draw();raf=requestAnimationFrame(step);}
    raf=requestAnimationFrame(step);
  },4000);
}

window.addEventListener('resize',resize);
</script>
